name: Get Repository Info
on: [push, pull_request]

# Важно! Указываем права доступа
permissions:
  contents: write  # Минимально необходимые права

jobs:
  get-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get repo info with gh
        # Явно передаем токен
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}")
          
          echo "Repository full name: $GITHUB_REPOSITORY"
          echo "API Response: $REPO"
          
          # Пример парсинга ответа (если установлен jq)
          if command -v jq &> /dev/null; then
            echo "Repo name: $(echo $REPO | jq -r .name)"
            echo "Description: $(echo $REPO | jq -r .description)"
          fi